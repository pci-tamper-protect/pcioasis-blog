name: Generate content variants

on:
  push:
    branches: [main]
    paths:
      - "content/posts/**/index.md"
  workflow_dispatch:
    inputs:
      post_path:
        description: "Relative path to post directory (e.g. content/posts/zkTLS/zktls-proof-of-provenance)"
        required: true

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Check out pcioasis-blog
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PLANETKESTEN_PAT }}

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: agents/content-pipeline
        run: uv sync --frozen

      - name: Detect changed post directories
        id: posts
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "dirs=${{ inputs.post_path }}" >> "$GITHUB_OUTPUT"
          else
            dirs=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} \
              | grep 'content/posts/.*/index\.md' \
              | xargs -I{} dirname {} \
              | sort -u \
              | tr '\n' ' ')
            echo "dirs=$dirs" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate variants for each changed post
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          for post_dir in ${{ steps.posts.outputs.dirs }}; do
            echo "Processing $post_dir"
            uv run --project agents/content-pipeline \
              python agents/content-pipeline/generate_variants.py "$post_dir"
          done

      - name: Open review PR for each post
        env:
          GH_TOKEN: ${{ secrets.PLANETKESTEN_PAT }}
        run: |
          for post_dir in ${{ steps.posts.outputs.dirs }}; do
            uv run --project agents/content-pipeline \
              python agents/content-pipeline/assemble_pr.py \
              "$post_dir" \
              --repo pci-tamper-protect/pcioasis-blog
          done
